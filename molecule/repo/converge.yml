---
- name: Install Repo runner
  hosts: all
  gather_facts: yes
  # become: yes # Do not use sudo due to https://github.com/geerlingguy/docker-rockylinux10-ansible/issues/2
  vars:
    runner_user: root
    github_repo: "{{ lookup('env', 'GITHUB_REPO') }}"
    github_account: "{{ lookup('env', 'GITHUB_ACCOUNT') }}"
    runner_version: "latest"
    runner_labels:
      - label1
      - repo-runner
  roles:
    - robertdebock.epel
    - monolithprojects.github_actions_runner

# Run the playbook again with different labels to test
- name: Update Repo runner
  hosts: all
  gather_facts: yes
  # become: yes
  vars:
    runner_user: root
    github_repo: "{{ lookup('env', 'GITHUB_REPO') }}"
    github_account: "{{ lookup('env', 'GITHUB_ACCOUNT') }}"
    runner_version: "latest"
    runner_labels:
      - label1
      - repo-runner
      - label2
  roles:
    - robertdebock.epel
    - monolithprojects.github_actions_runner
