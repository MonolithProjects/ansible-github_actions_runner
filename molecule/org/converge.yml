---
- name: Install Org Runner
  hosts: all
  # become: yes # Do not use sudo due to https://github.com/geerlingguy/docker-rockylinux10-ansible/issues/2
  vars:
    runner_user: root
    github_account: "{{ lookup('env', 'GITHUB_ACCOUNT') }}"
    runner_org: yes
    runner_state: "stopped"
    runner_version: "2.303.0"
  roles:
    - robertdebock.epel
    - monolithprojects.github_actions_runner
